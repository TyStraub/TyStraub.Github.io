

<style>


    body {
      background-image: linear-gradient(rgba(10,10,10),rgb(46, 46, 46));
      color:White;
      font-family: Helvetica, Arial, Geneva, Sans-serif;
    }   



    .card {
        border: 2px solid rgb(0, 0, 0);
        border-radius: 10px;
        min-width: 300px;
        line-height: 5px;
        border: 8px solid #212121;
        background-color:212121;
        width: 50%;
        margin: auto;
    }

    #TextInput{
        width: 100%;
        height: 5%;
        border: 2px solid rgb(211, 179, 0);
        border-radius: 10px;
        background-color:212121;
        color: white;
    }
    #ChatWrapper{
        border-radius: 10px;
        min-width: 300px;
        line-height: 5px;
        border: 8px solid #212121;
        background-color:212121;
        width: 50%;
        margin: auto;
        height: 80%;
    }

    .botBubble{
        position: relative;
        
        border-radius: 10px;
        line-height: 20px;
        border: 8px solid #372270;
        background-color:#372270;
        width: 98.2%;
    }
    
    .userBubble{
        position: relative;
        
        border-radius: 10px;
        line-height: 20px;
        border: 8px solid #af9317;
        background-color: #af9317;
        width: 98.2%;
    }


</style>

<html>
    <title>GPT Language Bot</title>
    <div id="card" class="card">
        <h1 style="font-size: 30px; text-align: center;"><b> GPT Language Bot </b></h1>
    </div>


    <div id="ChatWrapper">

    </div>

    <div id="TextIn" class="card">
        <input type="text" name="TextInput" id="TextInput">
    </div>


</html>

<script>

    //Collecting text box data!
    var input = document.getElementById("TextInput");
    var inputVal;//This value is important
    input.addEventListener("keypress", function(event){
        if(event.key == "Enter"){
            inputVal = input.value;
            event.preventDefault();
            console.log(inputVal);
            generateUserBubble(inputVal);
        }
    });

    //Making data look pretty!
    var CWrap = document.getElementById("ChatWrapper");
    var bubble;
    var bubbleText;

    function generateUserBubble(text){
        bubble = document.createElement("div");
        bubbleText = document.createTextNode("You: "+text);
        bubble.appendChild(bubbleText);
        CWrap.appendChild(bubble);
        bubble.className = "userBubble";
        promptGPT(text);
    }

    function generateBotBubble(text){
        bubble = document.createElement("div");
        bubbleText = document.createTextNode("Bot: "+text);
        bubble.appendChild(bubbleText);
        CWrap.appendChild(bubble);
        bubble.className = "botBubble";
    }

    //Time for GPT!
    generateBotBubble("Test")

</script>
